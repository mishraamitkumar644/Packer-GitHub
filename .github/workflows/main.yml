name: Azure Packer Terraform Pipeline

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:

  # -----------------------------
  # 1. SIG SETUP (NEW JOB)
  # -----------------------------
  sig-setup:
    runs-on: ubuntu-latest

    steps:

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Create Resource Group
      run: |
        az group create \
          --name rg-canada-prod \
          --location canadacentral

    - name: Create Shared Image Gallery
      run: |
        az sig create \
          --resource-group rg-canada-prod \
          --gallery-name canadaProdSIG

    - name: Create Image Definition
      run: |
        az sig image-definition create \
          --resource-group rg-canada-prod \
          --gallery-name canadaProdSIG \
          --gallery-image-definition ubuntu-docker-nginx \
          --publisher mycompany \
          --offer ubuntu \
          --sku docker-nginx \
          --os-type Linux \
          --hyper-v-generation V2

  # -----------------------------
  # 2. PACKER BUILD
  # -----------------------------
  packer-build:
    needs: sig-setup
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Packer
      uses: hashicorp/setup-packer@main

    - name: Packer Init
      run: |
        cd packer
        packer init .

    - name: Packer Validate
      run: |
        cd packer
        packer validate -var-file="pakvars.pkrvars.hcl" .

    - name: Packer Build
      run: |
        cd packer
        packer build -var-file="pakvars.pkrvars.hcl" .

  # -----------------------------
  # 3. TERRAFORM DEPLOY
  # -----------------------------
  terraform-deploy:
    needs: packer-build
    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Azure Login using OIDC
      uses: azure/login@v2
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Terraform Init
      run: |
        cd terraform
        terraform init

    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve
      env:
        TF_VAR_ssh_public_key: ${{ secrets.TF_SSH_PUBLIC_KEY }}
